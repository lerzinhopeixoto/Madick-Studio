<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Madick Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c9a84c;
    --accent-dim: rgba(201,168,76,0.12);
    --text: #f0ece4;
    --text-muted: #7a7570;
    --danger: #e05252;
    --danger-dim: rgba(224,82,82,0.12);
    --success: #5aab6e;
    --success-dim: rgba(90,171,110,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2rem;
  }

  .login-logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .login-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .login-box input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }

  .login-box button {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0d0d0d;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }
  .login-box button:hover { opacity: 0.88; }

  .login-error {
    font-size: 13px;
    color: var(--danger);
    display: none;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 0.06em;
  }

  header .logout-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  header .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1.25rem;
  }

  /* ── DATE PICKER ── */
  .date-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .date-row input[type="date"] {
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  .date-row input[type="date"]:focus { border-color: var(--accent); }

  .btn-primary {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0d0d0d;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-primary:hover { opacity: 0.85; }

  .btn-danger {
    padding: 7px 14px;
    background: var(--danger-dim);
    border: 1px solid var(--danger);
    border-radius: 8px;
    color: var(--danger);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-danger:hover { opacity: 0.75; }

  /* ── DIAS BLOQUEADOS ── */
  .blocked-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 1rem;
  }

  .blocked-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--danger-dim);
    border: 1px solid var(--danger);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    color: var(--danger);
  }

  .blocked-tag button {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .blocked-tag button:hover { opacity: 1; }

  .empty-msg {
    color: var(--text-muted);
    font-size: 14px;
    padding: 0.5rem 0;
  }

  /* ── AGENDAMENTOS ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .filter-row input[type="date"] {
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  .filter-row input[type="date"]:focus { border-color: var(--accent); }

  .btn-ghost {
    padding: 10px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--accent); }

  .agendamento-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .agendamento-item:hover { border-color: #3a3a3a; }

  .ag-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }

  .ag-nome {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }

  .ag-details {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .ag-horario {
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }

  .loading {
    color: var(--text-muted);
    font-size: 14px;
    padding: 1rem 0;
    text-align: center;
  }

  .feedback {
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    display: none;
    margin-top: 0.75rem;
  }
  .feedback.success { background: var(--success-dim); color: var(--success); display: block; }
  .feedback.error { background: var(--danger-dim); color: var(--danger); display: block; }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1.25rem 1rem; }
    .agendamento-item { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">MADICK STUDIO</div>
  <div class="login-box">
    <h2>Acesso admin</h2>
    <input type="password" id="senha-input" placeholder="Senha" />
    <div class="login-error" id="login-error">Senha incorreta.</div>
    <button onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <span class="logo">MADICK STUDIO — Admin</span>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </header>
  <main>

    <!-- BLOQUEAR DIAS -->
    <div class="card">
      <div class="card-title">Bloquear dia de folga</div>
      <div class="date-row">
        <input type="date" id="data-bloquear" />
        <button class="btn-primary" onclick="bloquearDia()">Bloquear dia</button>
      </div>
      <div class="feedback" id="feedback-bloqueio"></div>
      <div class="blocked-list" id="lista-bloqueados">
        <span class="empty-msg">Carregando...</span>
      </div>
    </div>

    <!-- AGENDAMENTOS -->
    <div class="card">
      <div class="card-title">Agendamentos</div>
      <div class="filter-row">
        <input type="date" id="data-filtro" />
        <button class="btn-ghost" onclick="carregarAgendamentos()">Filtrar</button>
        <button class="btn-ghost" onclick="verTodos()">Ver todos futuros</button>
      </div>
      <div id="lista-agendamentos">
        <span class="loading">Selecione uma data ou clique em "Ver todos futuros".</span>
      </div>
    </div>

  </main>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs, deleteDoc, doc,
    query, where, orderBy, Timestamp
  } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOGy5i5bKYMRaKwtpa9QaqethyAPlciD8",
  authDomain: "madick-studio-89228.firebaseapp.com",
  projectId: "madick-studio-89228",
  storageBucket: "madick-studio-89228.firebasestorage.app",
  messagingSenderId: "401704705955",
  appId: "1:401704705955:web:4419dfafc871eb0431c416"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── SENHA ── (mude aqui!)
  const SENHA_ADMIN = "madick2024";

  window.fazerLogin = function() {
    const v = document.getElementById('senha-input').value;
    if (v === SENHA_ADMIN) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      carregarBloqueados();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  };

  document.getElementById('senha-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.fazerLogin();
  });

  window.logout = function() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('senha-input').value = '';
  };

  // ── BLOQUEIOS ──
  async function carregarBloqueados() {
    const lista = document.getElementById('lista-bloqueados');
    lista.innerHTML = '<span class="empty-msg">Carregando...</span>';
    const snap = await getDocs(collection(db, 'diasBloqueados'));
    if (snap.empty) {
      lista.innerHTML = '<span class="empty-msg">Nenhum dia bloqueado.</span>';
      return;
    }
    lista.innerHTML = '';
    snap.forEach(d => {
      const tag = document.createElement('div');
      tag.className = 'blocked-tag';
      tag.innerHTML = `<span>${formatarData(d.data().data)}</span><button onclick="desbloquearDia('${d.id}', this)" title="Remover">×</button>`;
      lista.appendChild(tag);
    });
  }

  window.bloquearDia = async function() {
    const data = document.getElementById('data-bloquear').value;
    const fb = document.getElementById('feedback-bloqueio');
    if (!data) { mostrarFeedback(fb, 'Selecione uma data.', 'error'); return; }
    try {
      await addDoc(collection(db, 'diasBloqueados'), { data });
      mostrarFeedback(fb, 'Dia bloqueado com sucesso!', 'success');
      document.getElementById('data-bloquear').value = '';
      carregarBloqueados();
    } catch(e) {
      mostrarFeedback(fb, 'Erro ao bloquear dia.', 'error');
    }
  };

  window.desbloquearDia = async function(id, btn) {
    if (!confirm('Remover bloqueio deste dia?')) return;
    await deleteDoc(doc(db, 'diasBloqueados', id));
    btn.closest('.blocked-tag').remove();
    const lista = document.getElementById('lista-bloqueados');
    if (!lista.children.length) lista.innerHTML = '<span class="empty-msg">Nenhum dia bloqueado.</span>';
  };

  // ── AGENDAMENTOS ──
  window.carregarAgendamentos = async function() {
    const data = document.getElementById('data-filtro').value;
    const lista = document.getElementById('lista-agendamentos');
    if (!data) { lista.innerHTML = '<span class="empty-msg">Selecione uma data.</span>'; return; }
    lista.innerHTML = '<span class="loading">Carregando...</span>';
    const q = query(collection(db, 'agendamentos'), where('data', '==', data), orderBy('horario'));
    const snap = await getDocs(q);
    renderAgendamentos(snap, lista);
  };

  window.verTodos = async function() {
    const lista = document.getElementById('lista-agendamentos');
    lista.innerHTML = '<span class="loading">Carregando...</span>';
    const hoje = new Date().toISOString().split('T')[0];
    const q = query(collection(db, 'agendamentos'), where('data', '>=', hoje), orderBy('data'), orderBy('horario'));
    const snap = await getDocs(q);
    renderAgendamentos(snap, lista);
  };

  function renderAgendamentos(snap, lista) {
    if (snap.empty) { lista.innerHTML = '<span class="empty-msg">Nenhum agendamento encontrado.</span>'; return; }
    lista.innerHTML = '';
    snap.forEach(d => {
      const ag = d.data();
      const item = document.createElement('div');
      item.className = 'agendamento-item';
      item.innerHTML = `
        <div class="ag-info">
          <span class="ag-nome">${ag.nome || '—'}</span>
          <div class="ag-details">
            <span>📅 ${formatarData(ag.data)}</span>
            <span>✂️ ${ag.servico || '—'}</span>
            <span>📞 ${ag.telefone || '—'}</span>
          </div>
        </div>
        <span class="ag-horario">${ag.horario || '—'}</span>
        <button class="btn-danger" onclick="cancelarAgendamento('${d.id}', this)">Cancelar</button>
      `;
      lista.appendChild(item);
    });
  }

  window.cancelarAgendamento = async function(id, btn) {
    if (!confirm('Cancelar este agendamento?')) return;
    await deleteDoc(doc(db, 'agendamentos', id));
    btn.closest('.agendamento-item').remove();
    const lista = document.getElementById('lista-agendamentos');
    if (!lista.children.length) lista.innerHTML = '<span class="empty-msg">Nenhum agendamento encontrado.</span>';
  };

  // ── HELPERS ──
  function formatarData(str) {
    if (!str) return '—';
    const [y, m, d] = str.split('-');
    return `${d}/${m}/${y}`;
  }

  function mostrarFeedback(el, msg, tipo) {
    el.textContent = msg;
    el.className = 'feedback ' + tipo;
    setTimeout(() => { el.className = 'feedback'; }, 3000);
  }
</script>
</body>
</html>
